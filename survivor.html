<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a12">
  <title>SurvivorByFei</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a12;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0; left: 0;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// === SURVIVORBYFEI — Vampire Survivors-like ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H, scale;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = Math.min(W / 400, H / 700);
}
resize();
window.addEventListener('resize', () => { resize(); });

// === AUDIO ===
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function tone(freq, dur, type, vol) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
const sfx = {
  shoot: () => tone(220, 0.05, 'square', 0.04),
  hit: () => tone(80, 0.08, 'sawtooth', 0.05),
  xp: () => tone(660, 0.07, 'sine', 0.05),
  lvup: () => { tone(440, 0.1, 'sine', 0.1); setTimeout(() => tone(660, 0.12, 'sine', 0.1), 80); },
  die: () => tone(100, 0.3, 'sawtooth', 0.12),
};

// === STORAGE ===
function getHS() { return parseInt(localStorage.getItem('survivorbyfei_hs') || '0'); }
function setHS(v) { localStorage.setItem('survivorbyfei_hs', v); }

// === GAME STATE ===
let state = 'menu';
let player, enemies, projs, orbs, parts;
let wave, score, highScore, frame, gameTime;
let level, xp, xpNeed;
let weapons;
let touch = { on: false, sx: 0, sy: 0, cx: 0, cy: 0, dx: 0, dy: 0 };
let gameOver = false;

// === WEAPONS ===
const WDEFS = {
  magic: { name: 'Magic', color: '#a855f7', cd: 55, dmg: 15, spd: 6, sz: 8, count: 1, kind: 'ball' },
  arrow: { name: 'Arrow', color: '#22c55e', cd: 45, dmg: 12, spd: 11, sz: 5, count: 1, kind: 'arrow' },
  sword: { name: 'Sword', color: '#ef4444', cd: 70, dmg: 25, spd: 0, sz: 6, count: 1, kind: 'spin' },
  shield: { name: 'Shield', color: '#3b82f6', cd: 100, dmg: 5, spd: 0, sz: 12, count: 1, kind: 'orbit' },
  nova: { name: 'Nova', color: '#f97316', cd: 140, dmg: 30, spd: 0, sz: 0, count: 1, kind: 'nova' },
};

// === ROUND RECT HELPER ===
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill();
}

// === INIT ===
function init() {
  player = { x: W/2, y: H/2, sz: 20*scale, hp: 100, maxHp: 100, spd: 3.5*scale, inv: 0, angle: 0 };
  enemies = []; projs = []; orbs = []; parts = [];
  wave = 0; score = 0; frame = 0; gameTime = 0;
  level = 1; xp = 0; xpNeed = 10; gameOver = false;
  weapons = [{ ...WDEFS.magic, lvl: 1, cdT: 0, spinT: 0, spinA: 0, orbitA: 0 }];
}

// === SPAWN ===
function spawnE() {
  const m = 70*scale;
  const side = Math.floor(Math.random()*4);
  let x = side===0 ? Math.random()*W : side===1 ? W+m : side===2 ? Math.random()*W : -m;
  let y = side===0 ? -m : side===1 ? Math.random()*H : side===2 ? H+m : Math.random()*H;
  
  let i = 0;
  if (wave > 3 && Math.random() < 0.1) i = 3;
  else if (wave > 2 && Math.random() < 0.2) i = 2;
  else if (wave > 1 && Math.random() < 0.35) i = 1;
  
  const T = ['slime','bat','skull','demon'][i];
  const S = [16, 12, 20, 24][i];
  const HP = [20, 12, 40, 80][i];
  const SP = [1.5, 2.5, 1.0, 0.8][i];
  const DMG = [5, 3, 10, 15][i];
  const XP = [1, 1, 3, 5][i];
  const SC = [1, 1, 3, 5][i];
  const COL = ['#22c55e','#a855f7','#64748b','#ef4444'][i];
  
  enemies.push({
    x, y, sz: S*scale,
    hp: HP*(1+(wave-1)*0.2), maxHp: HP*(1+(wave-1)*0.2),
    spd: SP*scale, dmg: DMG, xp: XP, sc: SC, col: COL, type: T,
    hit: 0,
  });
}

function spawnXP(x, y, v) {
  orbs.push({ x, y, v, sz: (4+v*2)*scale, vx: (Math.random()-.5)*3, vy: (Math.random()-.5)*3, life: 300, mag: false, done: false });
}

function spawnPart(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2;
    const s = 2+Math.random()*5;
    parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, sz: (2+Math.random()*3)*scale, col, life: 1 });
  }
}

// === SHOOT ===
function shoot() {
  weapons.forEach(w => {
    w.cdT--;
    if (w.cdT > 0) return;
    
    const cnt = w.count + Math.floor((w.lvl-1)/2);
    const dmg = w.damage * (1+(w.lvl-1)*0.35);
    
    if (w.kind === 'ball') {
      w.cdT = w.cd;
      for (let i = 0; i < cnt; i++) {
        const a = player.angle + (Math.random()-.5)*0.3;
        projs.push({ x: player.x, y: player.y, vx: Math.cos(a)*w.spd*scale, vy: Math.sin(a)*w.spd*scale, sz: w.sz*scale, col: w.col, dmg, life: 180, kind: 'ball' });
      }
      sfx.shoot();
    } else if (w.kind === 'arrow') {
      w.cdT = w.cd;
      for (let i = 0; i < cnt; i++) {
        const sp = (i-(cnt-1)/2)*0.12;
        projs.push({ x: player.x, y: player.y, vx: Math.cos(player.angle+sp)*w.spd*scale, vy: Math.sin(player.angle+sp)*w.spd*scale, sz: w.sz*scale, col: w.col, dmg, life: 200, kind: 'arr' });
      }
      sfx.shoot();
    } else if (w.kind === 'spin') {
      w.cdT = w.cd;
      w.spinT = 25; w.spinA = 0;
      sfx.shoot();
    } else if (w.kind === 'orbit') {
      w.cdT = w.cd;
      w.orbitA = w.orbitA || 0;
      w.orbitT = 60;
      sfx.shoot();
    } else if (w.kind === 'nova') {
      w.cdT = w.cd;
      const rng = (w.sz || 120)*scale + w.lvl*20*scale;
      enemies.forEach(e => {
        if (Math.hypot(e.x-player.x, e.y-player.y) < rng + e.sz) {
          e.hp -= dmg; e.hit = 6;
          spawnPart(e.x, e.y, w.col, 4);
        }
      });
      for (let i = 0; i < 20; i++) {
        const a = (i/20)*Math.PI*2;
        parts.push({ x: player.x+Math.cos(a)*20*scale, y: player.y+Math.sin(a)*20*scale, vx: Math.cos(a)*5, vy: Math.sin(a)*5, sz: 6*scale, col: w.col, life: 1 });
      }
      sfx.hit();
    }
  });
}

// === UPDATE WEAPONS ===
function upWeap() {
  weapons.forEach(w => {
    if (w.kind === 'spin' && w.spinT > 0) {
      w.spinT--; w.spinA += 0.25;
      const r = (80+w.lvl*15)*scale;
      enemies.forEach(e => {
        const sx = player.x+Math.cos(w.spinA)*r;
        const sy = player.y+Math.sin(w.spinA)*r;
        if (Math.hypot(e.x-sx, e.y-sy) < e.sz+20*scale && frame%4===0) {
          e.hp -= w.damage*w.lvl; e.hit = 6;
          spawnPart(e.x, e.y, w.col, 3);
        }
      });
    }
    if (w.kind === 'orbit' && w.orbitT > 0) {
      w.orbitT--; w.orbitA += 0.07;
      const r = (60+w.lvl*10)*scale;
      enemies.forEach(e => {
        const sx = player.x+Math.cos(w.orbitA)*r;
        const sy = player.y+Math.sin(w.orbitA)*r;
        if (Math.hypot(e.x-sx, e.y-sy) < e.sz+16*scale && frame%8===0) {
          e.hp -= w.damage*w.lvl; e.hit = 6;
          spawnPart(e.x, e.y, w.col, 3);
        }
      });
    }
  });
}

// === UPDATE ===
function update() {
  if (state !== 'play') return;
  frame++; gameTime++;
  
  // Move
  let isMoving = false;
  if (touch.on && (Math.abs(touch.dx) > 4 || Math.abs(touch.dy) > 4)) {
    const len = Math.hypot(touch.dx, touch.dy);
    player.x += (touch.dx/len)*player.spd;
    player.y += (touch.dy/len)*player.spd;
    player.angle = Math.atan2(touch.dy, touch.dx);
    isMoving = true;
  }
  player.x = Math.max(player.sz, Math.min(W-player.sz, player.x));
  player.y = Math.max(player.sz, Math.min(H-player.sz, player.y));
  if (player.inv > 0) player.inv--;
  
  // Auto-aim at nearest enemy when not moving
  if (!isMoving && enemies.length > 0) {
    let nearest = null, nd = Infinity;
    enemies.forEach(e => {
      const d = Math.hypot(e.x-player.x, e.y-player.y);
      if (d < nd) { nd = d; nearest = e; }
    });
    if (nearest) player.angle = Math.atan2(nearest.y-player.y, nearest.x-player.x);
  }
  
  shoot(); upWeap();
  
  // Spawn
  if (frame % Math.max(15, 80-wave*5) === 0) {
    spawnE(); if (wave > 2) spawnE(); if (wave > 4) spawnE();
  }
  if (frame % 600 === 0) wave++;
  
  // Move enemies
  enemies.forEach(e => {
    const dx = player.x-e.x, dy = player.y-e.y;
    const d = Math.hypot(dx, dy);
    if (d > 0) { e.x += (dx/d)*e.spd; e.y += (dy/d)*e.spd; }
    if (e.hit > 0) e.hit--;
    if (d < player.sz+e.sz && player.inv===0) {
      player.hp -= e.dmg; player.inv = 25;
      sfx.hit();
      if (player.hp <= 0) { sfx.die(); gameOver=true; setTimeout(()=>state='gameover', 700); }
    }
  });
  
  // Move projs
  projs.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    enemies.forEach(e => {
      if (e.hp<=0) return;
      if (Math.hypot(p.x-e.x, p.y-e.y) < p.sz+e.sz) {
        e.hp -= p.dmg; e.hit = 8; p.life = 0;
        spawnPart(p.x, p.y, p.col, 4);
        sfx.hit();
      }
    });
  });
  projs = projs.filter(p => p.life>0 && p.x>-50 && p.x<W+50 && p.y>-50 && p.y<H+50);
  
  // Kill enemies
  enemies.forEach(e => {
    if (e.hp <= 0) {
      score += e.sc;
      spawnXP(e.x, e.y, e.xp);
      spawnPart(e.x, e.y, e.col, 6);
    }
  });
  enemies = enemies.filter(e => e.hp > 0);
  
  // Orbs
  orbs.forEach(o => {
    const d = Math.hypot(o.x-player.x, o.y-player.y);
    if (d < 120*scale) o.mag = true;
    if (o.mag && d > 1) {
      o.x += (player.x-o.x)/d * 8;
      o.y += (player.y-o.y)/d * 8;
    } else {
      o.x += o.vx; o.y += o.vy; o.vx *= 0.94; o.vy *= 0.94;
    }
    o.life--;
    if (d < player.sz+o.sz && !o.done) {
      o.done = true; xp += o.v; sfx.xp();
      if (xp >= xpNeed) {
        xp -= xpNeed; level++; xpNeed = Math.floor(xpNeed*1.5);
        sfx.lvup();
        for (let i=0; i<18; i++) { const a=(i/18)*Math.PI*2; parts.push({x:player.x,y:player.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,sz:6*scale,col:'#FFD700',life:1}); }
        addW();
      }
    }
  });
  orbs = orbs.filter(o => !o.done && o.life>0);
  
  // Parts
  parts.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=.92; p.vy*=.92; p.life-=.04; });
  parts = parts.filter(p => p.life>0);
  
  if (gameOver && state==='play') {} // handled above
}

function addW() {
  const have = weapons.map(w=>w.kind);
  const pool = Object.keys(WDEFS).filter(k => !have.includes(k));
  if (!pool.length) { weapons[Math.floor(Math.random()*weapons.length)].lvl++; return; }
  const k = pool[Math.floor(Math.random()*pool.length)];
  weapons.push({ ...WDEFS[k], lvl: 1, cdT: 0, spinT: 0, spinA: 0, orbitA: 0 });
}

// === DRAW ===
function drawBG() {
  // Dark gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0510');
  grad.addColorStop(0.5, '#0f0a1a');
  grad.addColorStop(1, '#1a0f25');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // Ground plane (bottom half)
  const groundGrad = ctx.createLinearGradient(0, H*0.55, 0, H);
  groundGrad.addColorStop(0, 'rgba(20,10,30,0)');
  groundGrad.addColorStop(0.3, 'rgba(15,10,25,0.7)');
  groundGrad.addColorStop(1, 'rgba(10,5,18,1)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H*0.55, W, H*0.45);
  
  // Atmospheric fog/vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.85);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  // Ambient floating particles (dust/magic in air)
  ctx.fillStyle = 'rgba(150,100,255,0.08)';
  for (let i = 0; i < 30; i++) {
    const seed = i * 73 + 11;
    const ax = ((seed * 17) % W);
    const ay = ((seed * 31 + frame * 0.3) % (H * 0.7));
    const ar = ((i % 4) + 1) * scale * 1.5;
    ctx.beginPath();
    ctx.arc(ax, ay, ar, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Subtle ground texture lines
  ctx.strokeStyle = 'rgba(100,60,150,0.06)';
  ctx.lineWidth = 1;
  const g = 60*scale, ox = (frame*.3)%g, oy = (frame*.2)%g;
  for (let x=-g+ox; x<W+g; x+=g) { ctx.beginPath(); ctx.moveTo(x, H*0.5); ctx.lineTo(x+20*scale, H); ctx.stroke(); }
}

function drawPlayer() {
  const {x,y,sz,inv} = player;
  if (inv>0 && frame%6<3) return;
  ctx.save(); ctx.translate(x,y);
  const g = ctx.createRadialGradient(0,0,0,0,0,sz*1.6);
  g.addColorStop(0,'rgba(59,130,246,0.25)'); g.addColorStop(1,'rgba(59,130,246,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,sz*1.6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3b82f6'; ctx.beginPath(); ctx.arc(0,0,sz,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#60a5fa'; ctx.beginPath(); ctx.arc(-sz*.1,-sz*.1,sz*.55,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sz*.3,-sz*.15,sz*.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a2e'; ctx.beginPath(); ctx.arc(sz*.35,-sz*.15,sz*.1,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  ctx.fillStyle = e.hit > 0 ? '#fff' : e.col;
  if (e.type === 'slime') {
    ctx.beginPath(); ctx.ellipse(0,0,e.sz,e.sz*.65,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-e.sz*.3,-e.sz*.1,e.sz*.14,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.sz*.3,-e.sz*.1,e.sz*.14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-e.sz*.3,-e.sz*.1,e.sz*.06,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.sz*.3,-e.sz*.1,e.sz*.06,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'bat') {
    ctx.beginPath(); ctx.ellipse(-e.sz*.9,0,e.sz*.65,e.sz*.35,.25,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(e.sz*.9,0,e.sz*.65,e.sz*.35,-.25,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = e.hit>0?'#fff':e.col;
    ctx.beginPath(); ctx.arc(0,0,e.sz*.55,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'skull') {
    ctx.beginPath(); ctx.arc(0,0,e.sz,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = e.hit>0?'#fff':'#475569';
    ctx.fillRect(-e.sz*.6,e.sz*.3,e.sz*1.2,e.sz*.5);
    ctx.fillStyle='#ef4444';
    ctx.beginPath(); ctx.arc(-e.sz*.35,-e.sz*.1,e.sz*.18,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.sz*.35,-e.sz*.1,e.sz*.18,0,Math.PI*2); ctx.fill();
  } else if (e.type === 'demon') {
    ctx.beginPath(); ctx.arc(0,0,e.sz,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = e.hit>0?'#fff':'#991b1b';
    ctx.beginPath(); ctx.moveTo(-e.sz*.5,-e.sz*.7); ctx.lineTo(-e.sz*.8,-e.sz*1.5); ctx.lineTo(-e.sz*.2,-e.sz*.9); ctx.fill();
    ctx.beginPath(); ctx.moveTo(e.sz*.5,-e.sz*.7); ctx.lineTo(e.sz*.8,-e.sz*1.5); ctx.lineTo(e.sz*.2,-e.sz*.9); ctx.fill();
    ctx.fillStyle='#fbbf24';
    ctx.beginPath(); ctx.arc(-e.sz*.35,-e.sz*.15,e.sz*.17,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.sz*.35,-e.sz*.15,e.sz*.17,0,Math.PI*2); ctx.fill();
  }
  if (e.hp < e.maxHp) {
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(-e.sz*1.1,-e.sz-8*scale,e.sz*2.2,4*scale);
    ctx.fillStyle='#ef4444';
    ctx.fillRect(-e.sz*1.1,-e.sz-8*scale,e.sz*2.2*(e.hp/e.maxHp),4*scale);
  }
  ctx.restore();
}

function drawProj(p) {
  ctx.fillStyle = p.col;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = p.col+'44';
  ctx.beginPath(); ctx.arc(p.x-p.vx*.6, p.y-p.vy*.6, p.sz*.65, 0, Math.PI*2); ctx.fill();
}

function drawOrb(o) {
  const pul = Math.sin(frame*.1+o.x)*.2+1;
  ctx.fillStyle='#22c55e';
  ctx.beginPath(); ctx.arc(o.x,o.y,o.sz*pul,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4ade80';
  ctx.beginPath(); ctx.arc(o.x,o.y,o.sz*.5*pul,0,Math.PI*2); ctx.fill();
}

function drawParts() {
  parts.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawUI() {
  // HP
  const hbW = 150*scale, hbH = 12*scale, hbX = 12*scale, hbY = 12*scale;
  ctx.fillStyle='rgba(0,0,0,0.5)'; rrect(hbX,hbY,hbW,hbH,4*scale);
  const hr = Math.max(0, player.hp/player.maxHp);
  ctx.fillStyle = hr>.5?'#22c55e':hr>.25?'#f97316':'#ef4444';
  rrect(hbX,hbY,hbW*hr,hbH,4*scale);
  ctx.fillStyle='#fff'; ctx.font=`bold ${11*scale}px system-ui`; ctx.textAlign='center';
  ctx.fillText(`${Math.ceil(player.hp)}/${player.maxHp}`, hbX+hbW/2, hbY+hbH-1.5*scale);
  
  // Level + XP
  ctx.textAlign='right';
  ctx.fillStyle='#fff'; ctx.font=`bold ${14*scale}px system-ui`;
  ctx.fillText(`LV ${level}`, W-12*scale, 24*scale);
  const xbW = 110*scale, xbH = 7*scale, xbX = W-12*scale-xbW, xbY = 30*scale;
  ctx.fillStyle='rgba(0,0,0,0.4)'; rrect(xbX,xbY,xbW,xbH,3*scale);
  ctx.fillStyle='#22c55e'; rrect(xbX,xbY,xbW*(xp/xpNeed),xbH,3*scale);
  
  // Score / Wave / Time
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font=`bold ${30*scale}px system-ui`;
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=6;
  ctx.fillText(score, W/2, 42*scale);
  ctx.shadowBlur=0;
  ctx.font=`${12*scale}px system-ui`; ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText(`Wave ${wave}  •  ${(gameTime/60|0)}:${(gameTime%60/60*100|0).toString().padStart(2,'0')}`, W/2, 60*scale);
  
  // Weapon icons
  const iy = H-36*scale;
  weapons.forEach((w,i) => {
    const ix = 12*scale+i*34*scale;
    ctx.fillStyle=w.col+'88'; ctx.beginPath(); ctx.arc(ix,iy,13*scale,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=w.col; ctx.beginPath(); ctx.arc(ix,iy,9*scale,0,Math.PI*2); ctx.fill();
    if (w.lvl>1) { ctx.fillStyle='#FFD700'; ctx.font=`bold ${9*scale}px system-ui`; ctx.textAlign='center'; ctx.fillText(w.lvl,ix,iy+3*scale); }
  });
  
  // Joystick indicator
  if (touch.on) {
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(touch.sx,touch.sy,48*scale,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.beginPath(); ctx.arc(touch.sx+touch.dx,touch.sy+touch.dy,18*scale,0,Math.PI*2); ctx.fill();
  }
}

function drawMenu() {
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font=`bold ${38*scale}px system-ui`;
  ctx.fillText('⚔️ SurvivorByFei', W/2, H*.3);
  ctx.font=`${20*scale}px system-ui`; ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.fillText('Tap to Start', W/2, H*.52);
  ctx.font=`${14*scale}px system-ui`; ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText(`Best: ${getHS()}`, W/2, H*.63);
  ctx.font=`${12*scale}px system-ui`; ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText('Left side = move  •  Auto-fire weapons', W/2, H*.75);
}

function drawGO() {
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  const cy = H*.32;
  ctx.textAlign='center';
  ctx.fillStyle='#ef4444'; ctx.font=`bold ${42*scale}px system-ui`;
  ctx.fillText('💀 Game Over', W/2, cy);
  ctx.fillStyle='#fff'; ctx.font=`${26*scale}px system-ui`;
  ctx.fillText(`${score} pts`, W/2, cy+60*scale);
  ctx.fillStyle='#22c55e'; ctx.font=`${20*scale}px system-ui`;
  ctx.fillText(`Best: ${getHS()}`, W/2, cy+100*scale);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font=`${16*scale}px system-ui`;
  ctx.fillText('Tap to Retry', W/2, cy+155*scale);
}

// === RENDER ===
function render() {
  drawBG();
  if (state === 'menu') {
    player = { x:W/2, y:H/2, sz:20*scale, hp:100, maxHp:100, spd:3.5*scale, inv:0, angle:0 };
    enemies.forEach(drawEnemy);
    drawPlayer();
    drawMenu();
    return;
  }
  orbs.forEach(drawOrb);
  enemies.forEach(drawEnemy);
  projs.forEach(drawProj);
  drawPlayer();
  drawParts();
  drawUI();
  if (state === 'gameover') drawGO();
}

// === INPUT ===
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const t = e.changedTouches[0];
  if (state === 'menu') { state = 'play'; init(); return; }
  if (state === 'gameover') { state = 'menu'; return; }
  touch.on = true;
  touch.sx = t.clientX; touch.sy = t.clientY;
  touch.cx = t.clientX; touch.cy = t.clientY;
  touch.dx = 0; touch.dy = 0;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch.on) return;
  const t = e.changedTouches[0];
  touch.cx = t.clientX; touch.cy = t.clientY;
  touch.dx = touch.cx - touch.sx;
  touch.dy = touch.cy - touch.sy;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touch.on = false; touch.dx = 0; touch.dy = 0;
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  initAudio();
  if (state === 'menu') { state = 'play'; init(); return; }
  if (state === 'gameover') { state = 'menu'; return; }
  touch.on = true;
  touch.sx = e.clientX; touch.sy = e.clientY;
  touch.cx = e.clientX; touch.cy = e.clientY;
  touch.dx = 0; touch.dy = 0;
});
canvas.addEventListener('mousemove', e => {
  if (!touch.on) return;
  touch.cx = e.clientX; touch.cy = e.clientY;
  touch.dx = touch.cx - touch.sx;
  touch.dy = touch.cy - touch.sy;
});
canvas.addEventListener('mouseup', () => { touch.on = false; touch.dx = 0; touch.dy = 0; });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    initAudio();
    if (state === 'menu') { state = 'play'; init(); }
    else if (state === 'gameover') state = 'menu';
  }
});

// === LOOP ===
function loop() { update(); render(); requestAnimationFrame(loop); }
init();
highScore = getHS();
loop();
</script>
</body>
</html>
