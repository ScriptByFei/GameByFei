<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a2a1a">
  <title>BearByFei 🐻</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐻</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1a0d;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// === BEARBYFEI — Side-Scrolling Runner ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// === SIZING ===
let W, H, scale;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = Math.min(W / 400, H / 700);
}
resize();
window.addEventListener('resize', resize);

// === AUDIO ===
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playTone(freq, duration, type = 'square', volume = 0.1) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playJump() { playTone(300, 0.1, 'square', 0.08); }
function playScore() { playTone(660, 0.15, 'sine', 0.1); }
function playDie() { playTone(120, 0.4, 'sawtooth', 0.15); }

// === STORAGE ===
function getHighScore() { return parseInt(localStorage.getItem('bearbyfei_highscore') || '0'); }
function setHighScore(s) { localStorage.setItem('bearbyfei_highscore', s); }

// === GAME STATE ===
let state = 'menu';
let score = 0, highScore = getHighScore();
let bear, obstacles, particles, frame, speed, groundY;
let gameSpeed, dist;

// === GROUND ===
function getGroundY() { return 65 * scale; }

// === BEAR ===
function createBear() {
  const size = 48 * scale;
  return {
    x: W * 0.18,
    y: H - getGroundY() - size,
    vy: 0,
    size,
    isJumping: false,
    jumpPower: -14 * scale,
    gravity: 0.6 * scale,
    maxSpeed: 18 * scale,
    frame: 0,
    isDead: false
  };
}

// === OBSTACLES ===
const OBSTACLE_TYPES = [
  { type: 'rock', w: 40, h: 35 },   // small rock
  { type: 'stump', w: 35, h: 50 },  // tree stump
  { type: 'cactus', w: 28, h: 55 }, // cactus
  { type: 'pit', w: 80, h: 20 },    // pit (gap in ground)
];

function getObstacleSize(type) {
  for (const t of OBSTACLE_TYPES) {
    if (t.type === type) return { w: t.w * scale, h: t.h * scale };
  }
  return { w: 40 * scale, h: 40 * scale };
}

function createObstacle(x) {
  const typeIdx = Math.floor(Math.random() * (OBSTACLE_TYPES.length - 1)); // no pit as first
  const type = OBSTACLE_TYPES[typeIdx].type;
  const size = getObstacleSize(type);
  const gy = H - getGroundY();
  
  if (type === 'pit') {
    return { type, x, y: gy, w: size.w, h: size.h, passed: false };
  }
  return { type, x, y: gy - size.h, w: size.w, h: size.h, passed: false };
}

function resetGame() {
  groundY = getGroundY();
  bear = createBear();
  obstacles = [];
  particles = [];
  frame = 0;
  gameSpeed = 6 * scale;
  dist = 0;
  score = 0;
}

// === PARTICLES ===
function spawnDust(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4 * scale,
      vy: -Math.random() * 3 * scale,
      life: 1,
      size: (3 + Math.random() * 4) * scale,
      color: `rgba(139,119,101,`
    });
  }
}

function spawnCrash(x, y) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8 * scale,
      vy: -Math.random() * 6 * scale,
      life: 1,
      size: (4 + Math.random() * 6) * scale,
      color: `rgba(180,80,60,`
    });
  }
}

// === DRAW ===
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a2e1a');
  grad.addColorStop(0.6, '#2d4a2d');
  grad.addColorStop(1, '#1a3010');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // Moon
  ctx.fillStyle = '#e8e0c0';
  ctx.beginPath();
  ctx.arc(W * 0.8, H * 0.15, 35 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a2e1a';
  ctx.beginPath();
  ctx.arc(W * 0.8 + 10 * scale, H * 0.15 - 5 * scale, 30 * scale, 0, Math.PI * 2);
  ctx.fill();
  
  // Stars
  ctx.fillStyle = 'rgba(255,255,200,0.7)';
  for (let i = 0; i < 40; i++) {
    const sx = ((73 * (i + 1) * 11) % W);
    const sy = ((97 * (i + 1) * 7) % (H * 0.5));
    ctx.beginPath();
    ctx.arc(sx, sy, scale * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Distant trees (parallax bg)
  ctx.fillStyle = '#1a381a';
  const treeOffset = (dist * 0.1) % (60 * scale);
  for (let i = -1; i < W / (60 * scale) + 2; i++) {
    const tx = i * 60 * scale - treeOffset;
    const th = (40 + (i % 3) * 15) * scale;
    ctx.beginPath();
    ctx.moveTo(tx, H - groundY - 10 * scale);
    ctx.lineTo(tx + 15 * scale, H - groundY - th);
    ctx.lineTo(tx + 30 * scale, H - groundY - 10 * scale);
    ctx.fill();
  }
}

function drawGround() {
  // Main ground
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(0, H - groundY, W, groundY);
  
  // Ground top edge
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(0, H - groundY, W, 8 * scale);
  
  // Grass tufts
  ctx.fillStyle = '#3a5a20';
  const grassOffset = (dist * 1) % (20 * scale);
  for (let i = -1; i < W / (20 * scale) + 2; i++) {
    const gx = i * 20 * scale - grassOffset;
    ctx.beginPath();
    ctx.moveTo(gx, H - groundY);
    ctx.lineTo(gx + 4 * scale, H - groundY - 6 * scale);
    ctx.lineTo(gx + 8 * scale, H - groundY);
    ctx.fill();
  }
}

function drawBear() {
  const { x, y, size, isJumping, isDead } = bear;
  const legAnim = isJumping ? 0 : Math.sin(frame * 0.3) * 0.3;
  
  ctx.save();
  ctx.translate(x, y);
  
  const bodyW = size * 1.3;
  const bodyH = size * 0.9;
  
  // Shadow
  if (!isDead) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(bodyW * 0.5, size + 4 * scale, bodyW * 0.5, 6 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Legs
  ctx.fillStyle = '#5a3820';
  // Back legs
  ctx.beginPath();
  ctx.ellipse(bodyW * 0.25, size - 8 * scale + (isJumping ? -5 : legAnim * 10), size * 0.2, size * 0.3, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bodyW * 0.7, size - 8 * scale + (isJumping ? -5 : -legAnim * 10), size * 0.2, size * 0.3, -0.2, 0, Math.PI * 2);
  ctx.fill();
  
  // Body
  ctx.fillStyle = '#6b4423';
  ctx.beginPath();
  ctx.ellipse(bodyW * 0.5, bodyH * 0.5, bodyW * 0.5, bodyH * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Belly
  ctx.fillStyle = '#8b6033';
  ctx.beginPath();
  ctx.ellipse(bodyW * 0.55, bodyH * 0.6, bodyW * 0.3, bodyH * 0.35, 0.2, 0, Math.PI * 2);
  ctx.fill();
  
  // Head
  ctx.fillStyle = '#6b4423';
  ctx.beginPath();
  ctx.arc(bodyW * 0.85, bodyH * 0.3, size * 0.42, 0, Math.PI * 2);
  ctx.fill();
  
  // Ears
  ctx.fillStyle = '#6b4423';
  ctx.beginPath();
  ctx.arc(bodyW * 0.65, bodyH * 0.05, size * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bodyW * 1.0, bodyH * 0.0, size * 0.18, 0, Math.PI * 2);
  ctx.fill();
  // Inner ears
  ctx.fillStyle = '#8b5a33';
  ctx.beginPath();
  ctx.arc(bodyW * 0.65, bodyH * 0.05, size * 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bodyW * 1.0, bodyH * 0.0, size * 0.1, 0, Math.PI * 2);
  ctx.fill();
  
  // Snout
  ctx.fillStyle = '#8b6033';
  ctx.beginPath();
  ctx.ellipse(bodyW * 1.1, bodyH * 0.4, size * 0.22, size * 0.18, 0.3, 0, Math.PI * 2);
  ctx.fill();
  
  // Nose
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(bodyW * 1.18, bodyH * 0.35, size * 0.08, size * 0.06, 0.3, 0, Math.PI * 2);
  ctx.fill();
  
  // Eye
  ctx.fillStyle = isDead ? '#555' : '#1a1a1a';
  ctx.beginPath();
  ctx.arc(bodyW * 0.9, bodyH * 0.22, size * 0.08, 0, Math.PI * 2);
  ctx.fill();
  // Eye highlight
  if (!isDead) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bodyW * 0.92, bodyH * 0.2, size * 0.03, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Tail
  ctx.fillStyle = '#6b4423';
  ctx.beginPath();
  ctx.arc(bodyW * 0.05, bodyH * 0.4, size * 0.18, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  ctx.translate(o.x, o.y);
  
  if (o.type === 'rock') {
    ctx.fillStyle = '#6a6a6a';
    ctx.beginPath();
    ctx.moveTo(0, o.h);
    ctx.lineTo(o.w * 0.2, o.h * 0.3);
    ctx.lineTo(o.w * 0.5, 0);
    ctx.lineTo(o.w * 0.8, o.h * 0.2);
    ctx.lineTo(o.w, o.h);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#8a8a8a';
    ctx.beginPath();
    ctx.moveTo(o.w * 0.2, o.h * 0.3);
    ctx.lineTo(o.w * 0.5, 0);
    ctx.lineTo(o.w * 0.5, o.h * 0.3);
    ctx.closePath();
    ctx.fill();
  } else if (o.type === 'stump') {
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(0, 0, o.w, o.h);
    ctx.fillStyle = '#7a5a40';
    ctx.beginPath();
    ctx.ellipse(o.w / 2, 0, o.w / 2, o.w * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    // rings
    ctx.strokeStyle = '#4a2a10';
    ctx.lineWidth = scale;
    for (let r = 0.2; r < 0.9; r += 0.25) {
      ctx.beginPath();
      ctx.ellipse(o.w / 2, 0, o.w * r * 0.5, o.w * r * 0.15, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  } else if (o.type === 'cactus') {
    ctx.fillStyle = '#2a5a2a';
    // Main stem
    ctx.fillRect(o.w * 0.35, 0, o.w * 0.3, o.h);
    // Left arm
    ctx.fillRect(0, o.h * 0.4, o.w * 0.35, o.w * 0.3);
    ctx.fillRect(0, o.h * 0.25, o.w * 0.15, o.h * 0.25);
    // Right arm
    ctx.fillRect(o.w * 0.65, o.h * 0.5, o.w * 0.35, o.w * 0.3);
    ctx.fillRect(o.w * 0.85, o.h * 0.3, o.w * 0.15, o.h * 0.3);
  } else if (o.type === 'pit') {
    // Gap in ground — draw darkness
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, o.w, o.h);
  }
  
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = p.color + (p.life * 0.8) + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawUI() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${42 * scale}px system-ui`;
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 8;
  ctx.fillText(Math.floor(dist / 10), W / 2, 60 * scale);
  ctx.shadowBlur = 0;
  
  ctx.font = `${16 * scale}px system-ui`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText(`Best: ${highScore}`, W / 2, 85 * scale);
}

function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${38 * scale}px system-ui`;
  ctx.textAlign = 'center';
  ctx.fillText('🐻 BearByFei', W / 2, H * 0.3);
  
  ctx.font = `${20 * scale}px system-ui`;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('Tap to Run', W / 2, H * 0.52);
  
  ctx.font = `${15 * scale}px system-ui`;
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText(`Best: ${highScore}m`, W / 2, H * 0.62);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  
  const cy = H * 0.35;
  
  ctx.fillStyle = '#FF6B6B';
  ctx.font = `bold ${42 * scale}px system-ui`;
  ctx.textAlign = 'center';
  ctx.fillText('💥 Game Over', W / 2, cy);
  
  ctx.fillStyle = '#fff';
  ctx.font = `${26 * scale}px system-ui`;
  ctx.fillText(`${Math.floor(dist / 10)}m`, W / 2, cy + 60 * scale);
  
  ctx.fillStyle = '#FFD93D';
  ctx.font = `${20 * scale}px system-ui`;
  ctx.fillText(`Best: ${highScore}m`, W / 2, cy + 100 * scale);
  
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = `${17 * scale}px system-ui`;
  ctx.fillText('Tap to Retry', W / 2, cy + 155 * scale);
}

// === GAME LOGIC ===
function jump() {
  initAudio();
  if (!bear.isJumping) {
    bear.vy = bear.jumpPower;
    bear.isJumping = true;
    playJump();
    spawnDust(bear.x + bear.size * 0.5, bear.y + bear.size);
  }
}

function update() {
  if (state !== 'play') return;
  
  frame++;
  dist += gameSpeed;
  score = Math.floor(dist / 10);
  
  // Increase speed over time
  gameSpeed = (6 + dist / 2000) * scale;
  
  // Bear physics
  bear.vy += bear.gravity;
  bear.y += bear.vy;
  bear.frame++;
  
  const groundLevel = H - groundY - bear.size;
  
  if (bear.y >= groundLevel) {
    bear.y = groundLevel;
    bear.vy = 0;
    if (bear.isJumping) {
      spawnDust(bear.x + bear.size * 0.5, bear.y + bear.size);
    }
    bear.isJumping = false;
  }
  
  // Spawn obstacles
  if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < W - 200 * scale - Math.random() * 150 * scale) {
    obstacles.push(createObstacle(W + 50));
  }
  
  // Update obstacles
  obstacles.forEach(o => {
    o.x -= gameSpeed;
  });
  
  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2 * scale;
    p.life -= 0.03;
  });
  particles = particles.filter(p => p.life > 0);
  
  // Check collisions
  for (const o of obstacles) {
    if (o.type === 'pit') {
      // Pit: bear falls if over the gap
      const pitLeft = o.x;
      const pitRight = o.x + o.w;
      const bearLeft = bear.x + bear.size * 0.2;
      const bearRight = bear.x + bear.size * 0.8;
      if (bearRight > pitLeft && bearLeft < pitRight) {
        if (!bear.isJumping) {
          die();
          return;
        }
      }
    } else {
      // Normal obstacle collision
      const bx = bear.x + bear.size * 0.3;
      const by = bear.y + bear.size * 0.3;
      const bw = bear.size * 0.5;
      const bh = bear.size * 0.6;
      
      const ox = o.x + 5 * scale;
      const oy = o.y + 5 * scale;
      const ow = o.w - 10 * scale;
      const oh = o.h - 5 * scale;
      
      if (bx + bw > ox && bx < ox + ow && by + bh > oy && by < oy + oh) {
        die();
        return;
      }
    }
  }
  
  // Remove off-screen obstacles
  obstacles = obstacles.filter(o => o.x + o.w > -20);
}

function die() {
  if (state !== 'play') return;
  state = 'gameover';
  bear.isDead = true;
  playDie();
  spawnCrash(bear.x + bear.size * 0.5, bear.y + bear.size * 0.4);
  if (score > highScore) {
    highScore = score;
    setHighScore(highScore);
  }
}

// === RENDER ===
function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  
  if (state === 'menu') {
    groundY = getGroundY();
    bear = createBear();
    drawGround();
    drawBear();
    drawMenu();
    return;
  }
  
  drawGround();
  
  // Draw pits (holes in ground)
  obstacles.filter(o => o.type === 'pit').forEach(drawObstacle);
  // Draw other obstacles
  obstacles.filter(o => o.type !== 'pit').forEach(drawObstacle);
  
  drawBear();
  drawParticles();
  
  if (state === 'play') {
    drawUI();
  }
  
  if (state === 'gameover') {
    drawUI();
    drawGameOver();
  }
}

// === INPUT ===
function handleTap() {
  if (state === 'menu') {
    state = 'play';
    resetGame();
    jump();
  } else if (state === 'play') {
    jump();
  } else if (state === 'gameover') {
    state = 'menu';
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  handleTap();
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  handleTap();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    handleTap();
  }
});

// === LOOP ===
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

resetGame();
groundY = getGroundY();
state = 'menu';
loop();
</script>
</body>
</html>
