<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0510">
  <title>SurvivorByFei</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#0a0510;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-text-size-adjust:100%;}
    html{--sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom);--sal:env(safe-area-inset-left);--sar:env(safe-area-inset-right);}
    body{padding-top:var(--sat,0px);padding-left:var(--sal,0px);padding-right:var(--sar,0px);padding-bottom:var(--sab,0px);}
    canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;touch-action:none}
  </style>
</head>
<body>
<canvas id="game"></canvas>
<input id="nickField" type="text" maxlength="8" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  style="position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);width:260px;font-size:24px;text-align:center;background:#1a1a2e;color:#fff;border:2px solid #f472b6;border-radius:8px;padding:12px 16px;display:none;z-index:100;outline:none;" />
<script type="module" src="src/game.js"></script>
</body>
</html>
