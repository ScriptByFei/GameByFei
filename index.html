<body>

<script>
// SURVIVORBYFEI v2 - Elite Mobs + Boss Waves + Level-Up Choice
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W,H,SC;
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  // Use visualViewport on iOS to handle dynamic island / keyboard / address bar
  if(window.visualViewport){
    W=window.visualViewport.width;
    H=window.visualViewport.height;
  } else {
    W=window.innerWidth;
    H=window.innerHeight;
  }
  canvas.width=W*dpr;
  canvas.height=H*dpr;
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  SC=Math.min(W/400,H/700);
  // Safe area helpers for PWA notch / home indicator
  const css=window.getComputedStyle(document.documentElement);
  safeTop=parseFloat(css.getPropertyValue('--sat'))||parseFloat(css.getPropertyValue('padding-top'))||Math.max(44,H*0.05);
  safeBottom=parseFloat(css.getPropertyValue('--sab'))||Math.max(34,H*0.03);
}
let safeTop=44,safeBottom=34;
resize();
window.addEventListener('resize',resize);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{resize();});
  window.visualViewport.addEventListener('scroll',()=>{resize();});
}

let AC;
function ACinit(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,d,t,v){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v||0.07,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const sfx={shoot:()=>{if(!soundEnabled)return;tone(220,0.05,'square',0.05);},hit:()=>{if(!soundEnabled)return;tone(80,0.07,'sawtooth',0.06);},xp:()=>{if(!soundEnabled)return;tone(700,0.06,'sine',0.06);},lvup:()=>{if(!soundEnabled)return;tone(440,0.1,'sine',0.1);setTimeout(()=>tone(660,0.12,'sine',0.1),80);},die:()=>{if(!soundEnabled)return;tone(100,0.3,'sawtooth',0.12);},elite:()=>{if(!soundEnabled)return;tone(880,0.15,'sine',0.12);setTimeout(()=>tone(1100,0.2,'sine',0.1),100);},boss:()=>{if(!soundEnabled)return;tone(110,0.4,'sawtooth',0.15);setTimeout(()=>tone(80,0.5,'sawtooth',0.12),200);},bosskill:()=>{if(!soundEnabled)return;tone(660,0.1,'sine',0.15);setTimeout(()=>tone(880,0.15,'sine',0.12),80);setTimeout(()=>tone(1100,0.2,'sine',0.1),180);}};

const COLORS={BG:'#0a0510',BG2:'#150d22',ACCENT:'#f472b6',GOLD:'#FFD700',HP_HIGH:'#22c55e',HP_MID:'#f97316',HP_LOW:'#ef4444',UI_BORDER:'rgba(255,255,255,0.15)'};

function getHS(){return parseInt(localStorage.getItem('survivorbyfei_hs')||'0');}
function setHS(v){localStorage.setItem('survivorbyfei_hs',v);}

let state='menu',selectedStartWeapon='magic',player,enemies,projs,orbs,parts,wave,score,frame,gameTime,level,xp,xpNeed,weapons,bossIntro=null,menuLeaderboardLoaded=false;
let nickInput='',nickCursor=0,nickChars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-',leaderboard=[],lbLoading=false;
const LB_BIN='69c969b22eb67b7abbe16728';
const LB_KEY='$2a$10$laWxXpPLHZIJxaF8I2HcGe/9CXo/d.aWoppS7MQxkGv7STeAfgIVm';
let touch={on:false,sx:0,sy:0,cx:0,cy:0,dx:0,dy:0},joystick={active:false,sx:0,sy:0,dx:0,dy:0,sz:35*SC};
let lastAimAngle=0;
let highScore=getHS(),bossActive=false,boss=null,levelUpOptions=[],selectedOption=-1;
let shakeT=0,shakeX=0,shakeY=0,dmgNums=[],bossSpawnedThisWave=false,eliteSpawnedThisWave=false,eliteTimer=0,lightningBolts=[],powerups=[],buffs={};
let paused=false,soundEnabled=true;
let bgDust=[],menuDust=[],deathPops=[],kills=0;
let hitStop=0,eliteFlash=0,bossBarHp=0,bossBarAlpha=0,bossBarMeta=null,combo=0,comboTimer=0,bossWarn=null,levelUpCooldown=0;
let gold=0;
const WEAPON_ICONS={magic:'🪨',arrow:'🏹',shield:'🛡️',nova:'💥',lightning:'⚡',};
const WDEF={
  magic:{col:'#a855f7',cd:50,dmg:15,spd:6,sz:9,cnt:1,kind:'ball',name:'Steinwurf'},
  arrow:{col:'#22c55e',cd:40,dmg:12,spd:11,sz:5,cnt:1,kind:'ball',name:'Arrow'},
  shield:{col:'#3b82f6',cd:90,dmg:5,spd:0,sz:13,cnt:1,kind:'orbit',name:'Shield'},
  nova:{col:'#f97316',cd:130,dmg:30,spd:0,sz:0,cnt:1,kind:'nova',name:'Nova'},
  lightning:{col:'#60a5fa',cd:55,dmg:18,spd:9,sz:8,cnt:1,kind:'chain',name:'Lightning',chain:3},

  {name:'Skull Lord',col:'#94a3b8',hpMult:20,dmgMult:2.5,sc:75,spawnMinions:8},

];
const PUDEF={heal:{col:'#22c55e',icon:'❤',name:'Heal',shape:'heart'},speed:{col:'#3b82f6',icon:'⚡',name:'Speed',shape:'bolt'},dmg:{col:'#ef4444',icon:'💥',name:'Damage',shape:'star'}};

  {t:'slime',c:'#22c55e',s:16,hp:20,sp:1.4,dmg:5,xp:1,sc:1},
  {t:'bat',c:'#a855f7',s:12,hp:12,sp:2.5,dmg:3,xp:1,sc:1},
  {t:'skull',c:'#94a3b8',s:20,hp:40,sp:0.9,dmg:10,xp:3,sc:3},

];

const nickField=document.getElementById('nickField');
function showNickInput(){
  nickField.style.display='block';
  nickField.value=nickInput;
  nickField.focus();
  nickField.setSelectionRange(nickCursor,nickCursor);
}
function hideNickInput(){nickField.style.display='none';nickField.blur();}
nickField.addEventListener('input',e=>{nickInput=nickField.value.toUpperCase().replace(/[^A-Z0-9_\-]/g,'').substring(0,8);nickCursor=nickInput.length;});
nickField.addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();if(nickInput.length>0){submitScore(nickInput,score);state='leaderboard';lbLoading=true;fetchLeaderboard().then(()=>lbLoading=false);hideNickInput();}}
  if(e.key==='Escape'){hideNickInput();}
});
async function fetchLeaderboard(){
  try{const r=await fetch('https://api.jsonbin.io/v3/b/'+LB_BIN+'/latest',{headers:{'X-Access-Key':LB_KEY}});const d=await r.json();leaderboard=d.record&&d.record.scores?d.record.scores:[];leaderboard.sort((a,b)=>b.s-a.s);}catch(e){leaderboard=[];}
}
async function submitScore(nick,pts){
  try{await fetch('https://api.jsonbin.io/v3/b/'+LB_BIN,{method:'PUT',headers:{'X-Access-Key':LB_KEY,'Content-Type':'application/json'},body:JSON.stringify({scores:[{n:nick,s:pts,t:Date.now()},...leaderboard.slice(0,49)]})});}catch(e){console.warn(e)}
}
function init(){
  player={x:W/2,y:H/2,sz:22*SC,hp:100,maxHp:100,spd:3.8*SC,inv:0,angle:0,vx:0,vy:0,dmgFlash:0};
  enemies=[];projs=[];orbs=[];parts=[];pools=[];
  wave=0;score=0;frame=0;gameTime=0;
  level=1;xp=0;xpNeed=10;kills=0;deathPops=[];
  weapons=[{...WDEF[selectedStartWeapon],lvl:1,cdT:0,spinT:0,spinA:0,orbitT:0,orbitA:0,wKey:selectedStartWeapon}];
  // Repair any weapons missing wKey (from older save versions)
  weapons.forEach(w=>{if(!w.wKey){const k=Object.keys(WDEF).find(k=>WDEF[k].kind===w.kind);w.wKey=k||'magic';}});
  bossActive=false;boss=null;shakeT=0;dmgNums=[];
  bossSpawnedThisWave=false;eliteSpawnedThisWave=false;
  hitStop=0;eliteFlash=0;bossBarHp=0;bossBarAlpha=0;bossBarMeta=null;combo=0;comboTimer=0;levelUpCooldown=0;
  powerups=[];buffs={};eliteTimer=0;lightningBolts=[];combo=0;comboTimer=0;bossIntro=null;bossWarn=null;menuLeaderboardLoaded=false;
  initAmbient();
  fetchLeaderboard();
}
function initAmbient(){
  bgDust=Array.from({length:18},(_,i)=>({x:(i*67%100)/100*W,y:(i*41%100)/100*H,vx:(Math.random()-.5)*0.08*SC,vy:(-0.08-Math.random()*0.06)*SC,sz:(1+Math.random()*2)*SC,a:0.1+Math.random()*0.1}));
  menuDust=Array.from({length:14},(_,i)=>({x:(i*53%100)/100*W,y:(i*29%100)/100*H,vx:(Math.random()-.5)*0.12*SC,vy:(-0.12-Math.random()*0.08)*SC,sz:(1.5+Math.random()*2.5)*SC,a:0.12+Math.random()*0.1,phase:Math.random()*Math.PI*2,col:'rgba(255,255,255,0.9)'}));
}
function makeEnemyEntity(x,y,d,scale=1,mods={}){return {x,y,sz:d.s*SC*scale,hp:(mods.hp??d.hp),maxHp:(mods.maxHp??mods.hp??d.hp),spd:(mods.spd??d.sp*SC),dmg:(mods.dmg??d.dmg),xp:(mods.xp??d.xp),sc:(mods.sc??d.sc),col:d.c,t:d.t,hit:0,elite:!!mods.elite,kbX:0,kbY:0,spawnIn:10,dead:false};}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function shiftHex(hex,amt){const h=(hex||'#000000').replace('#',''),full=h.length===3?h.split('').map(c=>c+c).join(''):h,n=parseInt(full,16),r=clamp((n>>16)+amt,0,255),g=clamp(((n>>8)&255)+amt,0,255),b=clamp((n&255)+amt,0,255);return `#${((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1)}`;}
function hitEnemy(e,dmg,col,srcX,srcY,partCount=5,partSpd=4){if(!e||e.dead||e.hp<=0)return;if(buffs.dmg&&buffs.dmg.t>0)dmg*=1.5;e.hp-=dmg;e.hit=10;if(dmg>=20)hitStop=Math.max(hitStop,3);const dx=e.x-srcX,dy=e.y-srcY,dist=Math.hypot(dx,dy)||1,push=Math.min(4.5*SC,1.1*SC+dmg*0.05*SC);e.kbX+=(dx/dist)*push;e.kbY+=(dy/dist)*push;spawnPart(srcX,srcY,col,partCount,partSpd);spawnImpactSparks(srcX,srcY,col);spawnDmgNum(e.x,e.y,dmg,col);sfx.hit();}
function hitBoss(dmg,col,srcX,srcY,partCount=6,partSpd=5){if(!boss||boss.hp<=0)return;if(buffs.dmg&&buffs.dmg.t>0)dmg*=1.5;boss.hp-=dmg;boss.hit=10;boss.hitFlash=8;if(dmg>=20)hitStop=Math.max(hitStop,3);const dx=boss.x-srcX,dy=boss.y-srcY,dist=Math.hypot(dx,dy)||1,push=Math.min(3*SC,0.8*SC+dmg*0.025*SC);boss.kbX=(boss.kbX||0)+(dx/dist)*push;boss.kbY=(boss.kbY||0)+(dy/dist)*push;spawnPart(srcX,srcY,col,partCount,partSpd);spawnImpactSparks(srcX,srcY,col);spawnDmgNum(boss.x,boss.y,dmg,col);sfx.hit();}
function spawnImpactSparks(x,y,col){for(let i=0;i<4;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*3;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,sz:(1.5+Math.random()*1.5)*SC,col,life:0.7});}}
function createDeathPop(x,y,sz,col){deathPops.push({x,y,sz,col,life:0.15,maxLife:0.15});}
function mkElite(bi){
  const d=ETYPES[bi],hp=d.hp*(1+(wave-1)*0.2)*5,m=60*SC,s=Math.floor(Math.random()*4);
  const x=s===0?Math.random()*W:s===1?W+m:s===2?Math.random()*W:-m;
  const y=s===0?-m:s===1?Math.random()*H:s===2?H+m:Math.random()*H;
  enemies.push(makeEnemyEntity(x,y,d,1.3,{hp,maxHp:hp,spd:d.sp*SC*0.7,dmg:d.dmg*1.5,xp:d.xp*5,sc:d.sc*3,elite:true}));
  sfx.elite();
}
function spawnBoss(){
  const bi=Math.min(Math.floor(wave/10)-1,BOSSES.length-1),bd=bi<0?BOSSES[0]:BOSSES[bi];
  const hp=bd.hpMult*(1+Math.max(0,wave-10)*0.3)*100,m=100*SC,side=Math.floor(Math.random()*4);
  const bx=side===0?W/2:side===1?W+m:side===2?W/2:-m;
  const by=side===0?-m:side===1?H/2:side===2?H+m:H/2;
  boss={x:bx,y:by,sz:55*SC,hp,maxHp:hp,spd:1.2*SC,dmg:20*bd.dmgMult,xp:bd.sc,sc:bd.sc,col:bd.col,t:'boss',hit:0,name:bd.name,spawnMinions:bd.spawnMinions,minionSpawned:false,attackTimer:120,hitFlash:0,kbX:0,kbY:0,spawnIn:12};
  bossActive=true;bossSpawnedThisWave=true;shakeT=30;bossBarHp=hp;bossBarAlpha=0;bossBarMeta={name:bd.name,col:bd.col,maxHp:hp,hp};bossIntro={name:bd.name,col:bd.col,t:120};sfx.boss();
}
function spawnBossMinions(){
  if(!boss||boss.minionSpawned)return;
  boss.minionSpawned=true;
  for(let i=0;i<boss.spawnMinions;i++){
    const a=(i/boss.spawnMinions)*Math.PI*2,mx=boss.x+Math.cos(a)*boss.sz*2,my=boss.y+Math.sin(a)*boss.sz*2;
    const d=ETYPES[Math.floor(Math.random()*2)];
    enemies.push(makeEnemyEntity(mx,my,d,0.8,{hp:d.hp*(1+(wave-1)*0.15),maxHp:d.hp*(1+(wave-1)*0.15),spd:d.sp*SC*1.2}));
  }
  sfx.elite();
}
function mkEnemy(){
  let spawnCount=1,isRing=false;
  if(wave>5 && Math.random()<0.05) {spawnCount=10+wave; isRing=true;}

  if(isRing) {
    const ringR=300*SC;
    let i=0;if(wave>4&&Math.random()<0.08)i=3;else if(wave>2&&Math.random()<0.2)i=2;else if(wave>1&&Math.random()<0.35)i=1;
    const d=ETYPES[i];
    for(let j=0;j<spawnCount;j++){
      const a=(j/spawnCount)*Math.PI*2;
      enemies.push(makeEnemyEntity(player.x+Math.cos(a)*ringR,player.y+Math.sin(a)*ringR,d,1,{hp:d.hp*(1+(wave-1)*0.2),maxHp:d.hp*(1+(wave-1)*0.2)}));
    }
    return;
  }

  const m=60*SC,s=Math.floor(Math.random()*4);
  const x=s===0?Math.random()*W:s===1?W+m:s===2?Math.random()*W:-m;
  const y=s===0?-m:s===1?Math.random()*H:s===2?H+m:Math.random()*H;
  let i=0;
  if(wave>4&&Math.random()<0.08)i=3;
  else if(wave>2&&Math.random()<0.2)i=2;
  else if(wave>1&&Math.random()<0.35)i=1;
  const d=ETYPES[i];
  enemies.push(makeEnemyEntity(x,y,d,1,{hp:d.hp*(1+(wave-1)*0.2),maxHp:d.hp*(1+(wave-1)*0.2)}));
}
function spawnXP(x,y,v){orbs.push({x,y,v,sz:(4+v*2)*SC,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:300,mag:false,done:false,kind:'xp'});}
function spawnGold(x,y,v){orbs.push({x,y,v,sz:(6+v)*SC,vx:(Math.random()-.5)*2.4,vy:(Math.random()-.5)*2.4,life:360,mag:false,done:false,kind:'gold'});}
function spawnPart(x,y,col,n,spd){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=(spd||3)+Math.random()*3;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,sz:(2+Math.random()*3)*SC,col,life:1});}}
function spawnDmgNum(x,y,dmg,col){const amt=Math.round(dmg),scale=Math.min(1.9,1+amt/45);const critCol=amt>=30?'#FFD700':col;dmgNums.push({x:x+(Math.random()-.5)*10*SC,y,dmg:amt,col:critCol,life:1,vy:(-2.8-amt*0.015)*SC,size:14*SC*scale,vx:(Math.random()-.5)*0.45*SC});}
function spawnPowerup(x,y){const keys=Object.keys(PUDEF),k=keys[Math.floor(Math.random()*keys.length)],p=PUDEF[k];const GT=window.__GAME_TOP||safeTop+10*SC,GB=window.__GAME_BOTTOM||H-safeBottom-10*SC;const cx=Math.max(40*SC,Math.min(W-40*SC,x)),cy=Math.max(GT+20*SC,Math.min(GB-20*SC,y));powerups.push({x:cx,y:cy,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5-0.5,sz:14*SC,col:p.col,icon:p.icon,type:k,life:300,ttl:600});}
function collectPowerup(p){if(p.type==='heal'){player.hp=Math.min(player.maxHp,player.hp+25);spawnPart(p.x,p.y,'#22c55e',8,4);sfx.xp();}else if(p.type==='speed'){buffs.speed={t:180};player.spd*=1.5;setTimeout((()=>{player.spd/=1.5;}).bind(this),9000);}else if(p.type==='dmg'){buffs.dmg={t:180};}spawnDmgNum(p.x,p.y-10,p.type==='heal'?'+25':p.type==='speed'?'SPD':'DMG',p.col);}
function shoot(){
  weapons.forEach(w=>{
    w.cdT--;
    if(w.cdT>0)return;
    const cnt=w.cnt+Math.floor((w.lvl-1)/2),dmg=w.dmg*(1+(w.lvl-1)*0.35);
    if(w.kind==='ball'){
      w.cdT=w.cd;
      for(let i=0;i<cnt;i++){
        const spread=cnt>1?(i-(cnt-1)/2)*0.1:0,a=player.angle+spread;
        projs.push({x:player.x,y:player.y,vx:Math.cos(a)*w.spd*SC,vy:Math.sin(a)*w.spd*SC,sz:w.sz*SC,col:w.col,dmg,life:200,kind:w.kind,wKey:w.wKey});
      }
      sfx.shoot();
    }else if(w.kind==='spin'){w.cdT=w.cd;w.spinT=28;w.spinA=0;sfx.shoot();}
    else if(w.kind==='orbit'){w.cdT=w.cd;w.orbitT=80;w.orbitA=0;sfx.shoot();}
    else if(w.kind==='nova'){
      w.cdT=w.cd;
      const rng=(w.sz||100)*SC+w.lvl*20*SC;
      enemies.forEach(e=>{if(Math.hypot(e.x-player.x,e.y-player.y)<rng+e.sz)hitEnemy(e,dmg,w.col,e.x,e.y,4,4);});
      if(boss&&Math.hypot(boss.x-player.x,boss.y-player.y)<rng+boss.sz)hitBoss(dmg,w.col,boss.x,boss.y,6,5);
      for(let i=0;i<24;i++){const a=(i/24)*Math.PI*2;parts.push({x:player.x+Math.cos(a)*20*SC,y:player.y+Math.sin(a)*20*SC,vx:Math.cos(a)*5,vy:Math.sin(a)*5,sz:7*SC,col:w.col,life:1});}
    }else if(w.kind==='chain'){
      w.cdT=w.cd;
      const chainCount=(w.chain||3)+(w.lvl-1);
      const allEnemies=[...enemies];
      if(boss&&boss.hp>0)allEnemies.push(boss);
      let targets=[],best=null,bestD=Infinity;
      allEnemies.forEach(e=>{const d=Math.hypot(e.x-player.x,e.y-player.y);if(d<bestD && d<200*SC){bestD=d;best=e;}});
      if(best){targets.push(best);const hit=new Set([best]);
        for(let c=1;c<chainCount;c++){
          let next=null,nextD=Infinity;
          allEnemies.forEach(e=>{if(hit.has(e))return;const d=Math.hypot(e.x-targets[targets.length-1].x,e.y-targets[targets.length-1].y);if(d<nextD){nextD=d;next=e;}});

  if(state==='levelup'){const bw=Math.min(260*SC,W-40*SC),bh=70*SC,startY=H*0.38,startX=W/2-bw/2,lv=t.clientY-startY;const opt=Math.floor(lv/(bh+12*SC));selectLevelUp(opt);return;}
  touch.on=true;touch.sx=t.clientX;touch.sy=t.clientY;touch.cx=t.clientX;touch.cy=t.clientY;touch.dx=0;touch.dy=0;
  if(H-t.clientY<150*SC&&t.clientX<150*SC){joystick.active=true;joystick.sx=t.clientX;joystick.sy=t.clientY;joystick.dx=0;joystick.dy=0;touch.on=false;}
},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(joystick.active){const t=e.changedTouches[0];const dx=t.clientX-joystick.sx,dy=t.clientY-joystick.sy,d=Math.hypot(dx,dy)||1;const cl=Math.min(d,joystick.sz);joystick.dx=(dx/d)*cl;joystick.dy=(dy/d)*cl;return;}if(!touch.on)return;const t=e.changedTouches[0];touch.cx=t.clientX;touch.cy=t.clientY;touch.dx=touch.cx-touch.sx;touch.dy=touch.cy-touch.sy;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(joystick.active){joystick.active=false;joystick.dx=0;joystick.dy=0;}touch.on=false;touch.dx=0;touch.dy=0;lastAimAngle=player.angle;},{passive:false});
canvas.addEventListener('mousedown',e=>{ACinit();const pbSz=22*SC,pbX=W-pbSz-16*SC,pbY=safeTop+18*SC;
  if(state==='menu'){
    const by=H*0.54,bw=180*SC,bh=52*SC;
    const lbY=H*0.7,lbW=160*SC,lbH=40*SC;
    if(e.clientX>=W/2-bw/2&&e.clientX<=W/2+bw/2&&e.clientY>=by&&e.clientY<=by+bh){state='weaponselect';return;}
    if(e.clientX>=W/2-lbW/2&&e.clientX<=W/2+lbW/2&&e.clientY>=lbY&&e.clientY<=lbY+lbH){lbLoading=true;fetchLeaderboard().then(()=>lbLoading=false);state='leaderboard';return;}
    return;
  }
  if(state==='weaponselect'){
    const keys=Object.keys(WDEF),bw=Math.min(260*SC,W-44*SC),bh=56*SC,startX=W/2-bw/2,startY=H*0.28;
    keys.forEach((k,i)=>{const y=startY+i*(bh+12*SC);if(e.clientX>=startX&&e.clientX<=startX+bw&&e.clientY>=y&&e.clientY<=y+bh)selectedStartWeapon=k;});
    const sy=startY+keys.length*(bh+12*SC)+10*SC,sbh=58*SC,by=sy+sbh+12*SC;
    if(e.clientX>=startX&&e.clientX<=startX+bw&&e.clientY>=sy&&e.clientY<=sy+sbh){state='play';init();return;}
    if(e.clientX>=startX&&e.clientX<=startX+bw&&e.clientY>=by&&e.clientY<=by+48*SC){state='menu';return;}
    return;
  }
  if(state==='paused'){
    const bw=Math.min(220*SC,W-60*SC),bh=60*SC,gap=14*SC,startY=H*0.43,startX=W/2-bw/2;
    const y=e.clientY-startY;
    if(y>=0&&y<bh){paused=false;state='play';return;}
    if(y>=bh+gap&&y<bh+gap+bh){soundEnabled=!soundEnabled;return;}
    if(y>=2*(bh+gap)&&y<2*(bh+gap)+bh){state='menu';paused=false;return;}
    return;
  }
  if(state==='nickinput'){
    const by=H*0.72,bw=160*SC,bh=50*SC;
    const sy=by+bh+16*SC;
    if(e.clientX>=W/2-bw/2&&e.clientX<=W/2+bw/2&&e.clientY>=by&&e.clientY<=by+bh){submitScore(nickInput,score);state='leaderboard';lbLoading=true;fetchLeaderboard().then(()=>lbLoading=false);hideNickInput();}
    if(e.clientX>=W/2-bw/2&&e.clientX<=W/2+bw/2&&e.clientY>=sy&&e.clientY<=sy+bh){state='leaderboard';lbLoading=true;fetchLeaderboard().then(()=>lbLoading=false);hideNickInput();}
    return;
  }
  if(state==='leaderboard'){
    const btnY=H*0.88,bw=140*SC,bh=44*SC;
    if(e.clientX>=W/2-bw/2&&e.clientX<=W/2+bw/2&&e.clientY>=btnY&&e.clientY<=btnY+bh){state='menu';return;}
    return;
  }
  if(e.clientX>=pbX&&e.clientX<=pbX+pbSz&&e.clientY>=pbY&&e.clientY<=pbY+pbSz){if(state==='play'){paused=true;state='paused';return;}if(state==='paused'){paused=false;state='play';return;}}
  if(state==='menu'){state='play';init();return;}
  if(state==='gameover'){lbLoading=true;fetchLeaderboard().then(()=>lbLoading=false);state='leaderboard';return;}
  if(state==='levelup'){const bw=Math.min(260*SC,W-40*SC),bh=70*SC,startY=H*0.38,startX=W/2-bw/2,lv=e.clientY-startY;const opt=Math.floor(lv/(bh+12*SC));selectLevelUp(opt);return;}
  touch.on=true;touch.sx=e.clientX;touch.sy=e.clientY;touch.cx=e.clientX;touch.cy=e.clientY;touch.dx=0;touch.dy=0;
});
canvas.addEventListener('mousemove',e=>{if(!touch.on)return;touch.cx=e.clientX;touch.cy=e.clientY;touch.dx=touch.cx-touch.sx;touch.dy=touch.cy-touch.sy;});
canvas.addEventListener('mouseup',()=>{touch.on=false;touch.dx=0;touch.dy=0;});
document.addEventListener('keydown',e=>{
  if(state==='nickinput'){
    nickInput=nickField.value.toUpperCase().replace(/[^A-Z0-9_\-]/g,'').substring(0,8);
    nickCursor=nickInput.length;
    if(e.code==='Enter'&&nickInput.length>0){submitScore(nickInput,score);state='leaderboard';lbLoading=true;fetchLeaderboard().then(()=>lbLoading=false);hideNickInput();}
    return;
  }
  if(e.code==='Escape'&&state==='leaderboard'){state='menu';menuLeaderboardLoaded=false;return;}
  if(e.code==='Escape'&&state==='weaponselect'){state='menu';return;}
  if(state==='weaponselect'&&e.key>='1'&&e.key<='5'){selectedStartWeapon=Object.keys(WDEF)[parseInt(e.key)-1]||selectedStartWeapon;return;}
  if(e.code==='Space'||e.code==='Enter'){ACinit();if(state==='menu'){state='weaponselect';}else if(state==='weaponselect'){state='play';init();}else if(state==='gameover'){lbLoading=true;fetchLeaderboard().then(()=>lbLoading=false);state='leaderboard';}}
  if(e.code==='Escape'&&(state==='play'||state==='paused')){paused=!paused;state=paused?'paused':'play';}
  if(e.code==='KeyM'){soundEnabled=!soundEnabled;}
  if(state==='levelup'&&e.key>='1'&&e.key<='3'){selectLevelUp(parseInt(e.key)-1);}
});
const keys={};document.addEventListener('keydown',e=>{keys[e.code]=true;});document.addEventListener('keyup',e=>{keys[e.code]=false;});
function handleKeys(){if(state!=='play')return;if(keys['ArrowLeft']||keys['KeyA']){player.vx=-player.spd;player.angle=Math.PI;lastAimAngle=Math.PI;touch.on=false;}if(keys['ArrowRight']||keys['KeyD']){player.vx=player.spd;player.angle=0;lastAimAngle=0;touch.on=false;}if(keys['ArrowUp']||keys['KeyW']){player.vy=-player.spd;player.angle=-Math.PI/2;lastAimAngle=-Math.PI/2;touch.on=false;}if(keys['ArrowDown']||keys['KeyS']){player.vy=player.spd;player.angle=Math.PI/2;lastAimAngle=Math.PI/2;touch.on=false;}player.x=Math.max(player.sz,Math.min(W-player.sz,player.x));const GT=window.__GAME_TOP||safeTop+90*SC,GB=window.__GAME_BOTTOM||H-safeBottom-10*SC;player.y=Math.max(GT+player.sz,Math.min(GB-player.sz,player.y));}
function loop(){handleKeys();if(hitStop>0){hitStop--;render();requestAnimationFrame(loop);return;}update();render();requestAnimationFrame(loop);}
init();highScore=getHS();loop();
</script>
